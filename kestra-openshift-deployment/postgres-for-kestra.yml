# PostgreSQL PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kestra-postgresql-pvc
  namespace: ryan-nix-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi

---
# PostgreSQL Secret
apiVersion: v1
kind: Secret
metadata:
  name: kestra-postgresql-secret
  namespace: ryan-nix-dev
type: Opaque
data:
  POSTGRES_PASSWORD: azNzdHI0  # base64 encoded "k3str4"
  POSTGRES_USER: a2VzdHJh      # base64 encoded "kestra"
  POSTGRES_DB: a2VzdHJh        # base64 encoded "kestra"