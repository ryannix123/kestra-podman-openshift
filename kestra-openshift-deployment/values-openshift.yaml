# Generated by deploy-kestra.yml — do not edit manually
configurations:
  application:
    datasources:
      postgres:
        url: jdbc:postgresql://kestra-postgresql:5432/kestra
        username: kestra
        password: k3str4
        driverClassName: org.postgresql.Driver
    kestra:
      repository:
        type: postgres
      queue:
        type: postgres
      storage:
        type: local
        local:
          base-path: "/app/kestra-storage"

common:
  podSecurityContext: {}
  securityContext:
    allowPrivilegeEscalation: false

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  startupProbe:
    httpGet:
      path: /health
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 60

  livenessProbe:
    httpGet:
      path: /health
      port: 8081
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: 8081
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 5

  initContainers:
    - name: wait-for-postgres
      image: kestra/kestra:latest
      command:
        - /bin/bash
        - -c
        - |
          until bash -c 'echo > /dev/tcp/kestra-postgresql/5432' 2>/dev/null; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

  extraVolumes:
    - name: kestra-storage
      persistentVolumeClaim:
        claimName: kestra-storage

  extraVolumeMounts:
    - name: kestra-storage
      mountPath: /app/kestra-storage

postgresql:
  enabled: false

dind:
  enabled: false

ingress:
  enabled: false
