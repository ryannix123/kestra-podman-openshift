---
# deploy-kestra.yml
#
# Deploys or removes Kestra workflow engine on OpenShift using Helm.
# Tested on: Red Hat OpenShift Developer Sandbox (ROSA)
#
# Usage:
#   Deploy:
#     ansible-playbook deploy-kestra.yml \
#       -e namespace=ryan-nix-dev \
#       -e kestra_db_password=k3str4
#
#   Uninstall (removes Helm release, postgres, route — KEEPS PVCs/data):
#     ansible-playbook deploy-kestra.yml \
#       -e namespace=ryan-nix-dev \
#       -e action=uninstall
#
#   Full teardown (removes everything including PVCs — DATA WILL BE LOST):
#     ansible-playbook deploy-kestra.yml \
#       -e namespace=ryan-nix-dev \
#       -e action=destroy
#
# Requirements:
#   ansible-galaxy collection install kubernetes.core
#   pip install kubernetes openshift
#   oc login (or set KUBECONFIG)

- name: Manage Kestra on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # ── Core settings ─────────────────────────────────────────────────────────
    namespace: ryan-nix-dev
    action: deploy                    # deploy | uninstall | destroy
    kestra_version: "latest"
    kestra_db_password: "k3str4"
    kestra_db_user: "kestra"
    kestra_db_name: "kestra"
    kestra_db_service: "kestra-postgresql"
    kestra_route_name: "kestra-route"

    # ── Images ────────────────────────────────────────────────────────────────
    postgresql_image: "registry.redhat.io/rhel9/postgresql-16:latest"
    kestra_image: "kestra/kestra:{{ kestra_version }}"

    # ── Storage ───────────────────────────────────────────────────────────────
    kestra_storage_pvc_name: "kestra-storage"
    kestra_storage_pvc_size: "10Gi"
    kestra_pg_pvc_name: "kestra-pg-data"
    kestra_pg_pvc_size: "5Gi"
    kestra_storage_mount_path: "/app/kestra-storage"

    # ── Helm ──────────────────────────────────────────────────────────────────
    helm_release_name: "kestra"
    helm_repo_name: "kestra"
    helm_repo_url: "https://helm.kestra.io/"
    values_file: "{{ playbook_dir }}/values-openshift.yaml"

  tasks:

    # ── Preflight ─────────────────────────────────────────────────────────────

    - name: Verify oc is authenticated
      ansible.builtin.command: oc whoami
      register: oc_whoami
      changed_when: false
      failed_when: oc_whoami.rc != 0

    - name: Show current user and action
      ansible.builtin.debug:
        msg: "Running action '{{ action }}' as {{ oc_whoami.stdout }} in namespace {{ namespace }}"

    - name: Verify target namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ namespace }}"
      register: ns_check
      failed_when: ns_check.resources | length == 0

    # ══════════════════════════════════════════════════════════════════════════
    # UNINSTALL — remove Helm release, postgres, route but KEEP PVCs
    # ══════════════════════════════════════════════════════════════════════════

    - name: UNINSTALL — Remove Helm release
      when: action in ['uninstall', 'destroy']
      kubernetes.core.helm:
        name: "{{ helm_release_name }}"
        release_namespace: "{{ namespace }}"
        state: absent
      ignore_errors: true

    - name: UNINSTALL — Remove PostgreSQL deployment
      when: action in ['uninstall', 'destroy']
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: "{{ kestra_db_service }}"
        namespace: "{{ namespace }}"
        state: absent
      ignore_errors: true

    - name: UNINSTALL — Remove PostgreSQL service
      when: action in ['uninstall', 'destroy']
      kubernetes.core.k8s:
        api_version: v1
        kind: Service
        name: "{{ kestra_db_service }}"
        namespace: "{{ namespace }}"
        state: absent
      ignore_errors: true

    - name: UNINSTALL — Remove OpenShift Route
      when: action in ['uninstall', 'destroy']
      kubernetes.core.k8s:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ kestra_route_name }}"
        namespace: "{{ namespace }}"
        state: absent
      ignore_errors: true

    - name: UNINSTALL — Remove generated values file
      when: action in ['uninstall', 'destroy']
      ansible.builtin.file:
        path: "{{ values_file }}"
        state: absent
      ignore_errors: true

    - name: UNINSTALL — Summary
      when: action == 'uninstall'
      ansible.builtin.debug:
        msg: |
          ✅ Kestra uninstalled. PVCs have been retained:
             - {{ kestra_pg_pvc_name }} (PostgreSQL data)
             - {{ kestra_storage_pvc_name }} (Kestra storage)

          Re-deploy at any time with:
            ansible-playbook deploy-kestra.yml -e namespace={{ namespace }}

    # ══════════════════════════════════════════════════════════════════════════
    # DESTROY — additionally remove PVCs (DATA WILL BE LOST)
    # ══════════════════════════════════════════════════════════════════════════

    - name: DESTROY — Remove Kestra storage PVC
      when: action == 'destroy'
      kubernetes.core.k8s:
        api_version: v1
        kind: PersistentVolumeClaim
        name: "{{ kestra_storage_pvc_name }}"
        namespace: "{{ namespace }}"
        state: absent
      ignore_errors: true

    - name: DESTROY — Remove PostgreSQL data PVC
      when: action == 'destroy'
      kubernetes.core.k8s:
        api_version: v1
        kind: PersistentVolumeClaim
        name: "{{ kestra_pg_pvc_name }}"
        namespace: "{{ namespace }}"
        state: absent
      ignore_errors: true

    - name: DESTROY — Summary
      when: action == 'destroy'
      ansible.builtin.debug:
        msg: "💥 Full teardown complete. All Kestra resources and data removed from {{ namespace }}."

    - name: End play for uninstall/destroy actions
      when: action in ['uninstall', 'destroy']
      ansible.builtin.meta: end_play

    # ══════════════════════════════════════════════════════════════════════════
    # DEPLOY
    # ══════════════════════════════════════════════════════════════════════════

    # ── Helm repo ─────────────────────────────────────────────────────────────

    - name: Add Kestra Helm repository
      kubernetes.core.helm_repository:
        name: "{{ helm_repo_name }}"
        repo_url: "{{ helm_repo_url }}"

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update
      changed_when: false

    # ── PVCs ──────────────────────────────────────────────────────────────────

    - name: Create PostgreSQL data PVC
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ kestra_pg_pvc_name }}"
            namespace: "{{ namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "{{ kestra_pg_pvc_size }}"

    - name: Create Kestra storage PVC
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ kestra_storage_pvc_name }}"
            namespace: "{{ namespace }}"
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "{{ kestra_storage_pvc_size }}"

    - name: Confirm PVCs are bound or pending
      kubernetes.core.k8s_info:
        api_version: v1
        kind: PersistentVolumeClaim
        namespace: "{{ namespace }}"
        name: "{{ item }}"
      register: pvc_status
      retries: 12
      delay: 5
      until: >
        pvc_status.resources | length > 0 and
        pvc_status.resources[0].status.phase in ['Bound', 'Pending']
      loop:
        - "{{ kestra_pg_pvc_name }}"
        - "{{ kestra_storage_pvc_name }}"

    # ── PostgreSQL 16 ─────────────────────────────────────────────────────────

    - name: Check if PostgreSQL is already deployed
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: "{{ kestra_db_service }}"
        namespace: "{{ namespace }}"
      register: pg_check

    - name: Deploy PostgreSQL 16
      when: pg_check.resources | length == 0
      ansible.builtin.command: >
        oc new-app {{ postgresql_image }}
        -e POSTGRESQL_USER={{ kestra_db_user }}
        -e POSTGRESQL_PASSWORD={{ kestra_db_password }}
        -e POSTGRESQL_DATABASE={{ kestra_db_name }}
        --name={{ kestra_db_service }}
        -n {{ namespace }}
      register: pg_deploy
      changed_when: pg_deploy.rc == 0

    - name: Attach PVC to PostgreSQL deployment
      ansible.builtin.command: >
        oc set volume deployment/{{ kestra_db_service }}
        --add
        --name={{ kestra_pg_pvc_name }}
        --type=persistentVolumeClaim
        --claim-name={{ kestra_pg_pvc_name }}
        --mount-path=/var/lib/pgsql/data
        --overwrite
        -n {{ namespace }}
      register: pvc_attach
      changed_when: pvc_attach.rc == 0

    - name: Wait for PostgreSQL rollout
      ansible.builtin.command: >
        oc rollout status deployment/{{ kestra_db_service }}
        -n {{ namespace }}
        --timeout=180s
      changed_when: false

    - name: Confirm PostgreSQL is accepting connections
      ansible.builtin.command: >
        oc exec deployment/{{ kestra_db_service }}
        -n {{ namespace }}
        -- pg_isready -U {{ kestra_db_user }} -d {{ kestra_db_name }}
      register: pg_ready
      retries: 12
      delay: 5
      until: pg_ready.rc == 0
      changed_when: false

    # ── values-openshift.yaml ─────────────────────────────────────────────────

    - name: Template values-openshift.yaml
      ansible.builtin.copy:
        dest: "{{ values_file }}"
        mode: "0644"
        content: |
          # Generated by deploy-kestra.yml — do not edit manually
          configurations:
            application:
              datasources:
                postgres:
                  url: jdbc:postgresql://{{ kestra_db_service }}:5432/{{ kestra_db_name }}
                  username: {{ kestra_db_user }}
                  password: {{ kestra_db_password }}
                  driverClassName: org.postgresql.Driver
              kestra:
                repository:
                  type: postgres
                queue:
                  type: postgres
                storage:
                  type: local
                  local:
                    base-path: "{{ kestra_storage_mount_path }}"

          common:
            podSecurityContext: {}
            securityContext:
              allowPrivilegeEscalation: false

            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "2Gi"
                cpu: "1000m"

            startupProbe:
              httpGet:
                path: /health
                port: 8081
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 60

            livenessProbe:
              httpGet:
                path: /health
                port: 8081
              initialDelaySeconds: 120
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 5

            readinessProbe:
              httpGet:
                path: /health
                port: 8081
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5

            initContainers:
              - name: wait-for-postgres
                image: {{ kestra_image }}
                command:
                  - /bin/bash
                  - -c
                  - |
                    until bash -c 'echo > /dev/tcp/{{ kestra_db_service }}/5432' 2>/dev/null; do
                      echo "Waiting for PostgreSQL..."
                      sleep 2
                    done
                    echo "PostgreSQL is ready!"

            extraVolumes:
              - name: kestra-storage
                persistentVolumeClaim:
                  claimName: {{ kestra_storage_pvc_name }}

            extraVolumeMounts:
              - name: kestra-storage
                mountPath: {{ kestra_storage_mount_path }}

          postgresql:
            enabled: false

          dind:
            enabled: false

          ingress:
            enabled: false

    # ── Helm install/upgrade ──────────────────────────────────────────────────

    - name: Check if Kestra Helm release exists
      ansible.builtin.command: >
        helm status {{ helm_release_name }} -n {{ namespace }}
      register: helm_status
      changed_when: false
      failed_when: false

    - name: Install Kestra via Helm
      when: helm_status.rc != 0
      kubernetes.core.helm:
        name: "{{ helm_release_name }}"
        chart_ref: "{{ helm_repo_name }}/kestra"
        release_namespace: "{{ namespace }}"
        values_files:
          - "{{ values_file }}"
        wait: false

    - name: Upgrade Kestra via Helm
      when: helm_status.rc == 0
      kubernetes.core.helm:
        name: "{{ helm_release_name }}"
        chart_ref: "{{ helm_repo_name }}/kestra"
        release_namespace: "{{ namespace }}"
        values_files:
          - "{{ values_file }}"
        wait: false

    # ── Wait for Kestra ───────────────────────────────────────────────────────

    - name: Wait for Kestra standalone pod to exist
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ namespace }}"
        label_selectors:
          - app.kubernetes.io/component=standalone
      register: kestra_pods
      retries: 24
      delay: 5
      until: kestra_pods.resources | length > 0

    - name: Wait for Kestra to become ready (up to 5 minutes)
      kubernetes.core.k8s:
        api_version: apps/v1
        kind: Deployment
        name: kestra-standalone
        namespace: "{{ namespace }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300

    # ── OpenShift Route ───────────────────────────────────────────────────────

    - name: Check if route already exists
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ kestra_route_name }}"
        namespace: "{{ namespace }}"
      register: route_check

    - name: Expose Kestra service as OpenShift Route
      when: route_check.resources | length == 0
      ansible.builtin.command: >
        oc expose svc/kestra
        --port=8080
        --name={{ kestra_route_name }}
        -n {{ namespace }}
      register: route_expose
      changed_when: route_expose.rc == 0

    - name: Patch route with TLS edge termination
      kubernetes.core.k8s:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ kestra_route_name }}"
        namespace: "{{ namespace }}"
        definition:
          spec:
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect

    - name: Get Kestra route
      kubernetes.core.k8s_info:
        api_version: route.openshift.io/v1
        kind: Route
        name: "{{ kestra_route_name }}"
        namespace: "{{ namespace }}"
      register: kestra_route

    # ── Summary ───────────────────────────────────────────────────────────────

    - name: Deployment summary
      ansible.builtin.debug:
        msg: |
          ✅ Kestra deployed successfully!

          🌐 UI:        https://{{ kestra_route.resources[0].spec.host }}
          🗄️  Database:  {{ kestra_db_service }} (PVC: {{ kestra_pg_pvc_name }}, {{ kestra_pg_pvc_size }})
          💾 Storage:   {{ kestra_storage_mount_path }} (PVC: {{ kestra_storage_pvc_name }}, {{ kestra_storage_pvc_size }})

          Uninstall (keep data):
            ansible-playbook deploy-kestra.yml -e namespace={{ namespace }} -e action=uninstall

          Full teardown (delete everything including data):
            ansible-playbook deploy-kestra.yml -e namespace={{ namespace }} -e action=destroy
